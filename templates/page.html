{% extends "base.html" %}

{% block content %}
  <article class="panel">
    <h2 style="margin-top:0">{{ page.title }}</h2>
    {% if page.body_html %}
      <div class="prose" style="color:var(--muted)">
        {{ page.body_html | safe }}
      </div>
    {% else %}
      <p class="lede" style="text-align:left;margin:0">{{ site.tagline }}</p>
      <p style="color:var(--muted)">{{ page.description }}</p>
    {% endif %}
  </article>
{% endblock %}
