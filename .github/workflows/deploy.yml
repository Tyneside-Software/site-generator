name: Build and deploy sites

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sites:
        description: "Comma-separated site ids (empty = all)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-sites
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout generator
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Build sites
        id: build
        run: |
          if [ -n "${{ inputs.sites }}" ]; then
            IFS=',' read -ra IDS <<< "${{ inputs.sites }}"
            python -m site_generator "${IDS[@]}"
          else
            python -m site_generator
          fi

      - name: Deploy tyneside.software
        if: ${{ hashFiles('output/software/**') != '' }}
        uses: ./.github/actions/deploy-site
        with:
          site_id: software
          repo: Tyneside-Software/tyneside.software
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Deploy tyneside.cleaning
        if: ${{ hashFiles('output/cleaning/**') != '' }}
        uses: ./.github/actions/deploy-site
        with:
          site_id: cleaning
          repo: Tyneside-Software/tyneside.cleaning
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Deploy tyneside.charity
        if: ${{ hashFiles('output/charity/**') != '' }}
        uses: ./.github/actions/deploy-site
        with:
          site_id: charity
          repo: Tyneside-Software/tyneside.charity
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Deploy tyneside.group
        if: ${{ hashFiles('output/group/**') != '' }}
        uses: ./.github/actions/deploy-site
        with:
          site_id: group
          repo: Tyneside-Software/tyneside.group
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Deploy tyneside.games
        if: ${{ hashFiles('output/games/**') != '' }}
        uses: ./.github/actions/deploy-site
        with:
          site_id: games
          repo: Tyneside-Software/tyneside.games
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}

      - name: Deploy tyneside.technology
        if: ${{ hashFiles('output/technology/**') != '' }}
        uses: ./.github/actions/deploy-site
        with:
          site_id: technology
          repo: Tyneside-Software/tyneside.technology
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
